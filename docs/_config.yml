# Jekyll theme
remote_theme: open-and-sustainable/greendoc_theme
# title and description, URLs
title: "alembica"
description: "Documentation of `alembica`"
baseurl: "/alembica"
url: "https://open-and-sustainable.github.io"
github_repo: "https://github.com/open-and-sustainable/alembica"
# logo and favicon
logo: "assets/images/logo.png"
